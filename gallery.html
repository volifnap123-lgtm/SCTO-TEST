<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Галерея работ СЦТО 'Правка Дисков' — до/после правки автомобильных дисков">
    <meta name="keywords" content="галерея работ, правка дисков, ремонт дисков, СЦТО, Улан-Удэ, до после">
    <meta name="author" content="СЦТО Правка Дисков">
    <title>Галерея | СЦТО "ПРАВКА ДИСКОВ"</title>
    
    <meta property="og:title" content="Галерея работ - СЦТО Правка Дисков">
    <meta property="og:description" content="Фотографии работ по правке автомобильных дисков">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/neon.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="neon-curve top-left"></div>
    <div class="neon-curve bottom-right"></div>
    <div class="neon-curve center-wave"></div>

    <header class="main-header">
        <div class="menu-left">
            <button class="nav-btn" data-page="index">Главное меню</button>
            <button class="nav-btn" data-page="catalog">Каталог</button>
            <button class="nav-btn active" data-page="gallery">Галерея</button>
            <button class="nav-btn" data-page="reviews">Отзывы</button>
        </div>
        <div class="logo">СЦТО "ПРАВКА ДИСКОВ"</div>
        <div class="menu-right">
            <button class="profile-btn" id="profileBtn">
                <div class="profile-icon">👤</div>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="gallery-container">
            <button class="gallery-nav prev">‹</button>
            <div class="gallery-main">
                <img src="images/placeholder.jpg" alt="Работа СЦТО" class="gallery-main-img" id="main-img">
                <div class="gallery-caption" id="caption">До и после правки диска R16</div>
            </div>
            <button class="gallery-nav next">›</button>
            <div class="gallery-thumbs" id="gallery-thumbs">
                <img src="images/placeholder.jpg" alt="Миниатюра 1" class="thumb active" data-src="images/placeholder.jpg" data-caption="До и после правки диска R16">
                <img src="images/placeholder.jpg" alt="Миниатюра 2" class="thumb" data-src="images/placeholder.jpg" data-caption="Правка литого диска после удара">
                <img src="images/placeholder.jpg" alt="Миниатюра 3" class="thumb" data-src="images/placeholder.jpg" data-caption="Восстановление штампованного диска">
                <img src="images/placeholder.jpg" alt="Миниатюра 4" class="thumb" data-src="images/placeholder.jpg" data-caption="Оборудование для правки дисков">
                <img src="images/placeholder.jpg" alt="Миниатюра 5" class="thumb" data-src="images/placeholder.jpg" data-caption="Результат работы мастера">
            </div>
        </div>
    </main>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <span class="close-btn" id="closeProfileModal">&times;</span>
            <div id="profileContent">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="js/gallery.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
