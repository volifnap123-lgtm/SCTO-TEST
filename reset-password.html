<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля | СЦТО "ПРАВКА ДИСКОВ"</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/neon.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        .reset-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .reset-container h1 { color: var(--primary); margin-bottom: 10px; }
        .reset-container p { color: var(--text-light); margin-bottom: 30px; }
        .success-message, .error-message { padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .success-message { background: #d4edda; color: #155724; }
        .error-message { background: #f8d7da; color: #721c24; }
        .hidden { display: none !important; }
        .form-step { margin-bottom: 20px; }
        .code-display { 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 24px; 
            font-family: monospace;
            letter-spacing: 4px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="neon-curve top-left"></div>
    <div class="neon-curve bottom-right"></div>
    
    <header class="main-header">
        <div class="logo">СЦТО "ПРАВКА ДИСКОВ"</div>
    </header>

    <div class="reset-container">
        <div id="step-email" class="form-step">
            <h1>🔑</h1>
            <h2 style="color: var(--primary); margin-bottom: 10px;">Восстановление пароля</h2>
            <p>Введите email, на который зарегистрирован аккаунт</p>
            
            <form id="email-form" class="auth-form">
                <div class="form-group">
                    <label for="reset-email">
                        <span class="label-icon">📧</span>
                        Email
                    </label>
                    <input type="email" id="reset-email" class="neon-input" required placeholder="example@mail.ru">
                </div>
                <button type="submit" class="neon-button full-width" id="send-code-btn">
                    <span>📧</span> Получить код
                </button>
            </form>
        </div>

        <div id="step-code" class="hidden form-step">
            <h1>📧</h1>
            <h2 style="color: var(--primary); margin-bottom: 10px;">Код отправлен!</h2>
            <p>Введите код из email</p>
            
            <div class="code-display" id="test-code-display" style="display: none;"></div>
            
            <form id="code-form" class="auth-form">
                <div class="form-group">
                    <label for="reset-code">
                        <span class="label-icon">🔢</span>
                        Код
                    </label>
                    <input type="text" id="reset-code" class="neon-input" required placeholder="Введите 6-значный код" maxlength="6">
                </div>
                <div class="form-group">
                    <label for="new-password">
                        <span class="label-icon">🔒</span>
                        Новый пароль
                    </label>
                    <input type="password" id="new-password" class="neon-input" required placeholder="Минимум 6 символов" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">
                        <span class="label-icon">🔒</span>
                        Подтвердите пароль
                    </label>
                    <input type="password" id="confirm-password" class="neon-input" required placeholder="Повторите пароль">
                </div>
                <button type="submit" class="neon-button full-width">
                    <span>💾</span> Изменить пароль
                </button>
            </form>
            
            <button class="neon-button full-width" style="margin-top: 10px;" onclick="showStep('step-email')">
                Использовать другой email
            </button>
        </div>

        <div id="step-success" class="hidden">
            <h1 style="color: #28a745;">✅</h1>
            <div class="success-message">
                <h3>Пароль успешно изменён!</h3>
                <p>Теперь вы можете войти с новым паролем</p>
            </div>
            <a href="index.html" class="neon-button">Перейти на главную</a>
        </div>
        
        <div id="step-error" class="hidden">
            <h1 style="color: #dc3545;">❌</h1>
            <div class="error-message">
                <h3>Ошибка!</h3>
                <p id="error-text">Что-то пошло не так</p>
            </div>
            <a href="index.html" class="neon-button">Перейти на главную</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://noskliwvsiejokzmczfp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vc2tsaXd2c2llam9rem1jemZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzU5MTgsImV4cCI6MjA4ODgxMTkxOH0.2NplRLLx1Annta9DL8Wus-OoObQwUbYR4X_vHouDEbE';
        
        let supabase = null;
        let resetEmail = '';
        let resetCode = '';
        
        function initSupabase() {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSupabase);
        } else {
            initSupabase();
        }

        function showStep(stepId) {
            document.querySelectorAll('.form-step').forEach(el => el.classList.add('hidden'));
            document.getElementById('step-success')?.classList.add('hidden');
            document.getElementById('step-error')?.classList.add('hidden');
            
            const step = document.getElementById(stepId);
            if (step) step.classList.remove('hidden');
        }

        function showError(message) {
            document.getElementById('error-text').textContent = message;
            showStep('step-error');
        }

        // Отправка email для получения кода
        document.getElementById('email-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            resetEmail = document.getElementById('reset-email').value;
            const btn = document.getElementById('send-code-btn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Отправка...';
            
            try {
                const response = await fetch('https://noskliwvsiejokzmczfp.supabase.co/functions/v1/send-reset-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY
                    },
                    body: JSON.stringify({ email: resetEmail })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                // Сохраняем код для проверки
                resetCode = data.testCode || '';
                localStorage.setItem('reset_email', resetEmail);
                localStorage.setItem('reset_code', resetCode);
                
                // Показываем тестовый код (убрать на проде!)
                const codeDisplay = document.getElementById('test-code-display');
                if (resetCode) {
                    codeDisplay.textContent = 'ТЕСТОВЫЙ КОД: ' + resetCode;
                    codeDisplay.style.display = 'block';
                }
                
                showStep('step-code');
                
            } catch (err) {
                showError('Ошибка отправки. Попробуйте снова.');
            }
            
            btn.disabled = false;
            btn.innerHTML = '<span>📧</span> Получить код';
        });

        // Проверка кода и смена пароля
        document.getElementById('code-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!supabase) {
                showError('Система не загружена. Обновите страницу.');
                return;
            }
            
            const enteredCode = document.getElementById('reset-code').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword.length < 6) {
                alert('Пароль минимум 6 символов');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alert('Пароли не совпадают');
                return;
            }
            
            // Проверяем код (в реальности - через Edge Function)
            const savedCode = localStorage.getItem('reset_code');
            if (enteredCode !== savedCode && savedCode !== '') {
                alert('Неверный код');
                return;
            }
            
            // Меняем пароль через Supabase
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            
            if (error) {
                showError(error.message);
                return;
            }
            
            // Очищаем localStorage
            localStorage.removeItem('reset_email');
            localStorage.removeItem('reset_code');
            
            showStep('step-success');
        });
    </script>
</body>
</html>
