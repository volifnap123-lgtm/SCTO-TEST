<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля | СЦТО "ПРАВКА ДИСКОВ"</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/neon.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        .reset-container {
            max-width: 450px;
            margin: 50px auto;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .reset-container h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .reset-container p {
            color: var(--text-light);
            margin-bottom: 30px;
        }
        .success-message, .error-message {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="neon-curve top-left"></div>
    <div class="neon-curve bottom-right"></div>
    
    <header class="main-header">
        <div class="logo">СЦТО "ПРАВКА ДИСКОВ"</div>
    </header>

    <div class="reset-container">
        <div id="loading-state">
            <h1>🔑</h1>
            <p>Проверка ссылки...</p>
        </div>
        
        <div id="reset-form" class="hidden">
            <h1>🔑</h1>
            <h2 style="color: var(--primary); margin-bottom: 10px;">Новый пароль</h2>
            <p>Введите новый пароль для вашего аккаунта</p>
            
            <form id="new-password-form" class="auth-form">
                <div class="form-group">
                    <label for="new-password">
                        <span class="label-icon">🔒</span>
                        Новый пароль
                    </label>
                    <input type="password" id="new-password" class="neon-input" required placeholder="Минимум 6 символов" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">
                        <span class="label-icon">🔒</span>
                        Подтвердите пароль
                    </label>
                    <input type="password" id="confirm-password" class="neon-input" required placeholder="Повторите пароль">
                </div>
                <button type="submit" class="neon-button full-width">
                    <span>💾</span> Сохранить пароль
                </button>
            </form>
        </div>
        
        <div id="success-state" class="hidden">
            <h1 style="color: #28a745;">✅</h1>
            <div class="success-message">
                <h3>Пароль успешно изменён!</h3>
                <p>Теперь вы можете войти с новым паролем</p>
            </div>
            <a href="index.html" class="neon-button">Перейти на главную</a>
        </div>
        
        <div id="error-state" class="hidden">
            <h1 style="color: #dc3545;">❌</h1>
            <div class="error-message">
                <h3>Ошибка!</h3>
                <p id="error-text">Ссылка недействительна или устарела</p>
            </div>
            <a href="index.html" class="neon-button">Перейти на главную</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://noskliwvsiejokzmczfp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vc2tsaXd2c2llam9rem1jemZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzU5MTgsImV4cCI6MjA4ODgxMTkxOH0.2NplRLLx1Annta9DL8Wus-OoObQwUbYR4X_vHouDEbE';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showNotification(message) {
            alert(message);
        }

        async function handlePasswordReset() {
            // Проверяем hash (Supabase использует # для токена)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            // Проверяем search
            const searchParams = new URLSearchParams(window.location.search);
            
            const token = hashParams.get('access_token') || searchParams.get('token');
            const type = hashParams.get('type') || searchParams.get('type');

            if (!token) {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                document.getElementById('error-text').textContent = 'Токен не найден в ссылке. Возможно ссылка устарела.';
                return;
            }

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('reset-form').classList.remove('hidden');

            document.getElementById('new-password-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                if (newPassword.length < 6) {
                    showNotification('Пароль минимум 6 символов');
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    showNotification('Пароли не совпадают');
                    return;
                }

                // Устанавливаем сессию из токена
                const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
                    access_token: token,
                    refresh_token: token
                });
                
                if (sessionError) {
                    showNotification('Ошибка установки сессии: ' + sessionError.message);
                    return;
                }

                // Теперь меняем пароль
                const { data, error } = await supabase.auth.updateUser({ password: newPassword });
                
                if (error) {
                    showNotification('Ошибка: ' + error.message);
                    return;
                }

                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('success-state').classList.remove('hidden');
            });
        }

        handlePasswordReset();
    </script>
</body>
</html>
