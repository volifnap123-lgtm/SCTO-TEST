<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Отзывы клиентов СЦТО 'Правка Дисков' — реальные отзывы">
    <meta name="keywords" content="отзывы, правка дисков, СЦТО, Улан-Удэ, отзывы клиентов">
    <meta name="author" content="СЦТО Правка Дисков">
    <title>Отзывы | СЦТО "ПРАВКА ДИСКОВ"</title>
    
    <meta property="og:title" content="Отзывы клиентов - СЦТО Правка Дисков">
    <meta property="og:description" content="Реальные отзывы клиентов">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/neon.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        .reviews-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .reviews-header {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 3px solid var(--yellow-neon);
            margin-bottom: 30px;
        }
        
        .dgis-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #00a3ff, #0077cc);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .rating-big {
            font-size: 80px;
            font-weight: bold;
            color: var(--orange-main);
            text-shadow: 0 0 30px var(--yellow-neon-glow);
            margin: 10px 0;
        }
        
        .rating-stars {
            font-size: 40px;
            color: var(--yellow-neon);
            text-shadow: 0 0 15px var(--yellow-neon-glow);
            margin: 15px 0;
        }
        
        .rating-count {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }
        
        .leave-review-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--orange-main), var(--orange-dark));
            color: white;
            border: 2px solid var(--yellow-neon);
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 152, 0, 0.4);
        }
        
        .leave-review-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(255, 152, 0, 0.5);
        }
        
        .reviews-grid {
            display: grid;
            gap: 20px;
        }
        
        .review-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .review-card:hover {
            border-color: var(--yellow-neon);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            transform: translateY(-3px);
        }
        
        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .review-author-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .review-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange-main), var(--orange-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            font-weight: bold;
            border: 3px solid var(--yellow-neon);
            box-shadow: 0 0 15px var(--yellow-neon-glow);
        }
        
        .review-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .review-date {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .review-rating {
            font-size: 24px;
            color: var(--yellow-neon);
            text-shadow: 0 0 10px var(--yellow-neon-glow);
        }
        
        .review-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-primary);
            margin-bottom: 15px;
        }
        
        .review-source {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #00a3ff;
            background: rgba(0, 163, 255, 0.1);
            padding: 6px 12px;
            border-radius: 15px;
        }
        
        .reviews-empty {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .reviews-empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .reviews-empty h3 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .reviews-empty p {
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .reviews-header {
                padding: 30px 20px;
            }
            
            .rating-big {
                font-size: 60px;
            }
            
            .rating-stars {
                font-size: 30px;
            }
            
            .review-card {
                padding: 20px;
            }
            
            .review-avatar {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
            
            .review-name {
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .review-top {
                flex-direction: column;
                gap: 15px;
            }
            
            .rating-big {
                font-size: 48px;
            }
            
            .leave-review-btn {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="neon-curve top-left"></div>
    <div class="neon-curve bottom-right"></div>

    <header class="main-header">
        <div class="menu-left">
            <button class="nav-btn" data-page="index">Главное меню</button>
            <button class="nav-btn" data-page="catalog">Каталог</button>
            <button class="nav-btn" data-page="gallery">Галерея</button>
            <button class="nav-btn active" data-page="reviews">Отзывы</button>
        </div>
        <div class="logo">СЦТО "ПРАВКА ДИСКОВ"</div>
        <div class="menu-right">
            <button class="theme-toggle" id="themeToggle" title="Сменить тему">
                <span class="sun">☀️</span>
                <span class="moon">🌙</span>
            </button>
            <button class="profile-btn" id="profileBtn">
                <div class="profile-icon">👤</div>
            </button>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title neon-text">Отзывы клиентов</h1>
        
        <div class="reviews-page">
            <div class="reviews-header">
                <div class="dgis-badge">
                    <span>📍</span>
                    <span>2ГИС</span>
                </div>
                <h2>Оценка компании</h2>
                <div class="rating-big" id="avgRating">4.9</div>
                <div class="rating-stars" id="avgStars">★★★★★</div>
                <div class="rating-count" id="ratingCount">на основе отзывов наших клиентов</div>
                <a href="https://2gis.ru/ulanude/firm/5207815350139447" target="_blank" class="leave-review-btn">
                    <span>📝</span>
                    Оставить отзыв на 2ГИС
                </a>
            </div>
            
            <div class="reviews-grid" id="reviewsGrid">
                <div class="reviews-empty">
                    <div class="reviews-empty-icon">⭐</div>
                    <h3>Загрузка отзывов...</h3>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <span class="close-btn" id="closeProfileModal">&times;</span>
            <div id="profileContent">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        const SUPABASE_URL = 'https://noskliwvsiejokzmczfp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VO6LwV9CJe-45tDjFgXGug_TzYoQ-6v';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadReviews() {
            const grid = document.getElementById('reviewsGrid');
            
            try {
                const { data: reviews, error } = await supabase
                    .from('reviews')
                    .select('*')
                    .eq('active', true)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!reviews || reviews.length === 0) {
                    grid.innerHTML = `
                        <div class="reviews-empty">
                            <div class="reviews-empty-icon">💬</div>
                            <h3>Отзывов пока нет</h3>
                            <p>Будьте первым, кто оставит отзыв!</p>
                        </div>
                    `;
                    return;
                }
                
                // Рассчитываем средний рейтинг
                const avgRating = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
                document.getElementById('avgRating').textContent = avgRating.toFixed(1);
                document.getElementById('avgStars').textContent = '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5 - Math.round(avgRating));
                document.getElementById('ratingCount').textContent = `на основе ${reviews.length} ${getReviewsWord(reviews.length)}`;
                
                grid.innerHTML = reviews.map(r => {
                    const initials = r.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                    
                    return `
                        <div class="review-card">
                            <div class="review-top">
                                <div class="review-author-info">
                                    <div class="review-avatar">${initials}</div>
                                    <div>
                                        <div class="review-name">${r.name}</div>
                                        <div class="review-date">${formatDate(r.review_date || r.created_at)}</div>
                                    </div>
                                </div>
                                <div class="review-rating">${stars}</div>
                            </div>
                            <p class="review-text">${r.text}</p>
                            <span class="review-source">📍 Источник: 2ГИС</span>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Ошибка загрузки отзывов:', error);
                grid.innerHTML = `
                    <div class="reviews-empty">
                        <div class="reviews-empty-icon">⚠️</div>
                        <h3>Ошибка загрузки</h3>
                        <p>Попробуйте обновить страницу</p>
                    </div>
                `;
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        
        function getReviewsWord(n) {
            if (n === 1) return 'отзыва';
            if (n >= 2 && n <= 4) return 'отзывов';
            return 'отзывов';
        }
        
        loadReviews();
    </script>
</body>
</html>
