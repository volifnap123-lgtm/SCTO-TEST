<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Отзывы клиентов СЦТО 'Правка Дисков' — реальные отзывы">
    <meta name="keywords" content="отзывы, правка дисков, СЦТО, Улан-Удэ, отзывы клиентов">
    <meta name="author" content="СЦТО Правка Дисков">
    <title>Отзывы | СЦТО "ПРАВКА ДИСКОВ"</title>
    
    <meta property="og:title" content="Отзывы клиентов - СЦТО Правка Дисков">
    <meta property="og:description" content="Реальные отзывы клиентов">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/neon.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        .reviews-page {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .reviews-sidebar {
            position: sticky;
            top: 120px;
            height: fit-content;
        }
        
        .reviews-header {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 2px solid var(--yellow-neon);
        }
        
        .dgis-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #00a3ff, #0077cc);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .rating-big {
            font-size: 60px;
            font-weight: bold;
            color: var(--orange-main);
            text-shadow: 0 0 20px var(--yellow-neon-glow);
            margin: 5px 0;
        }
        
        .rating-stars {
            font-size: 32px;
            color: var(--yellow-neon);
            text-shadow: 0 0 10px var(--yellow-neon-glow);
            margin: 10px 0;
        }
        
        .rating-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .rating-breakdown {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .rating-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .rating-row span:first-child {
            width: 15px;
            color: var(--text-secondary);
        }
        
        .rating-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .rating-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange-main), var(--yellow-neon));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .rating-count-small {
            width: 20px;
            text-align: right;
            color: var(--text-secondary);
        }
        
        .leave-review-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--orange-main), var(--orange-dark));
            color: white;
            border: 2px solid var(--yellow-neon);
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            width: 100%;
        }
        
        .leave-review-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 152, 0, 0.5);
        }
        
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            min-height: 300px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        
        .review-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .review-card:hover {
            border-color: var(--yellow-neon);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }
        
        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .review-author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .review-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange-main), var(--orange-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: bold;
            border: 2px solid var(--yellow-neon);
            box-shadow: 0 0 10px var(--yellow-neon-glow);
        }
        
        .review-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
        }
        
        .review-date {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .review-rating {
            font-size: 20px;
            color: var(--yellow-neon);
            text-shadow: 0 0 8px var(--yellow-neon-glow);
        }
        
        .review-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .review-source {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #00a3ff;
            background: rgba(0, 163, 255, 0.1);
            padding: 5px 10px;
            border-radius: 12px;
        }
        
        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        
        .review-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: white;
            background: linear-gradient(135deg, var(--orange-main), var(--orange-dark));
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(255, 152, 0, 0.3);
        }
        
        .review-link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }
        
        .reviews-empty {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .reviews-empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .reviews-empty h3 {
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .reviews-empty p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        @media (max-width: 992px) {
            .reviews-page {
                grid-template-columns: 1fr;
            }
            
            .reviews-sidebar {
                position: static;
            }
        }
        
        @media (max-width: 768px) {
            .reviews-header {
                padding: 25px 20px;
            }
            
            .rating-big {
                font-size: 50px;
            }
            
            .rating-stars {
                font-size: 26px;
            }
            
            .review-card {
                padding: 18px;
            }
            
            .review-avatar {
                width: 42px;
                height: 42px;
                font-size: 16px;
            }
            
            .review-name {
                font-size: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .review-top {
                flex-direction: column;
                gap: 12px;
            }
            
            .rating-big {
                font-size: 42px;
            }
            
            .leave-review-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
        
        .page-title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--orange-main);
            text-shadow: 0 0 10px var(--yellow-neon-glow), 0 0 20px var(--yellow-neon-glow);
            position: relative;
            z-index: 2;
            padding-top: 20px;
            animation: title-glow 3s ease-in-out infinite;
        }

        @keyframes title-glow {
            0%, 100% {
                text-shadow: 0 0 10px var(--yellow-neon-glow), 0 0 20px var(--yellow-neon-glow);
                opacity: 1;
            }
            50% {
                text-shadow: 0 0 15px var(--yellow-neon-glow), 0 0 30px var(--yellow-neon-glow);
                opacity: 0.9;
            }
        }
    </style>
</head>
<body>
    <!-- Modal for viewing full-size photos -->
    <div id="photoModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center;" onclick="this.style.display='none'">
        <img id="modalImage" style="max-width: 90%; max-height: 90%; border-radius: 10px;" onclick="event.stopPropagation()">
    </div>

    <div class="neon-curve top-left"></div>
    <div class="neon-curve bottom-right"></div>
    
    <div class="bg-decoration tire-1">🛞</div>
    <div class="bg-decoration tire-2">🛞</div>
    <div class="bg-decoration wrench-1">🔧</div>
    <div class="bg-decoration wrench-2">🔧</div>
    <div class="bg-decoration gear-1">⚙️</div>
    <div class="bg-decoration gear-2">⚙️</div>

    <header class="main-header">
        <div class="menu-left">
            <button class="nav-btn" data-page="index">Главное меню</button>
            <button class="nav-btn" data-page="catalog">Каталог</button>
            <button class="nav-btn" data-page="gallery">Галерея</button>
            <button class="nav-btn active" data-page="reviews">Отзывы</button>
        </div>
        <div class="logo">СЦТО "ПРАВКА ДИСКОВ"</div>
        <div class="menu-right">
            <button class="theme-toggle" id="themeToggle" title="Сменить тему">
                <span class="sun">☀️</span>
                <span class="moon">🌙</span>
            </button>
            <button class="profile-btn" id="profileBtn">
                <div class="profile-icon">👤</div>
            </button>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Отзывы клиентов</h1>
        
        <div class="reviews-page">
            <aside class="reviews-sidebar">
                <div class="reviews-header">
                    <div class="dgis-badge">
                        <span>📍</span>
                        <span>2ГИС</span>
                    </div>
                    <div class="rating-big" id="avgRating">4.9</div>
                    <div class="rating-stars" id="avgStars">★★★★★</div>
                    <div class="rating-count" id="ratingCount">на основе отзывов</div>
                    <div class="rating-breakdown" id="ratingBreakdown">
                        <div class="rating-row" data-stars="5"><span>5</span><div class="rating-bar"><div class="rating-bar-fill" id="bar5"></div></div><span class="rating-count-small" id="count5">0</span></div>
                        <div class="rating-row" data-stars="4"><span>4</span><div class="rating-bar"><div class="rating-bar-fill" id="bar4"></div></div><span class="rating-count-small" id="count4">0</span></div>
                        <div class="rating-row" data-stars="3"><span>3</span><div class="rating-bar"><div class="rating-bar-fill" id="bar3"></div></div><span class="rating-count-small" id="count3">0</span></div>
                        <div class="rating-row" data-stars="2"><span>2</span><div class="rating-bar"><div class="rating-bar-fill" id="bar2"></div></div><span class="rating-count-small" id="count2">0</span></div>
                        <div class="rating-row" data-stars="1"><span>1</span><div class="rating-bar"><div class="rating-bar-fill" id="bar1"></div></div><span class="rating-count-small" id="count1">0</span></div>
                    </div>
                    <a href="https://2gis.ru/ulanude/firm/5207815350139447" target="_blank" class="leave-review-btn">
                        <span>📝</span>
                        Оставить отзыв
                    </a>
                </div>
            </aside>
            
            <div class="reviews-list" id="reviewsGrid">
                <div class="reviews-empty">
                    <div class="reviews-empty-icon">⭐</div>
                    <h3>Загрузка отзывов...</h3>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <span class="close-btn" id="closeProfileModal">&times;</span>
            <div id="profileContent">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js?v=3"></script>
    <script src="js/main.js?v=20"></script>
    <script>
        async function loadReviews() {
            const grid = document.getElementById('reviewsGrid');
            
            try {
                const { data: reviews, error } = await window.supabaseClient
                    .from('reviews')
                    .select('*')
                    .eq('active', true)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!reviews || reviews.length === 0) {
                    grid.innerHTML = `
                        <div class="reviews-empty">
                            <div class="reviews-empty-icon">💬</div>
                            <h3>Отзывов пока нет</h3>
                            <p>Будьте первым, кто оставит отзыв!</p>
                        </div>
                    `;
                    return;
                }
                
                // Рассчитываем средний рейтинг
                const avgRating = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
                document.getElementById('avgRating').textContent = avgRating.toFixed(1);
                document.getElementById('avgStars').textContent = '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5 - Math.round(avgRating));
                document.getElementById('ratingCount').textContent = `на основе ${reviews.length} ${getReviewsWord(reviews.length)}`;
                
                // Разбивка по звёздам
                const ratingCounts = {5: 0, 4: 0, 3: 0, 2: 0, 1: 0};
                reviews.forEach(r => { ratingCounts[r.rating] = (ratingCounts[r.rating] || 0) + 1; });
                const maxCount = Math.max(...Object.values(ratingCounts));
                for (let i = 5; i >= 1; i--) {
                    const count = ratingCounts[i];
                    const percent = maxCount > 0 ? (count / maxCount) * 100 : 0;
                    document.getElementById('bar' + i).style.width = percent + '%';
                    document.getElementById('count' + i).textContent = count;
                }
                
                grid.innerHTML = reviews.map(r => {
                    const initials = r.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                    const linkBtn = r.review_link ? `<a href="${r.review_link}" target="_blank" class="review-link-btn">🔗 Перейти к отзыву</a>` : '';
                    
                    let photosHtml = '';
                    if (r.photos) {
                        const photos = r.photos.split(',').filter(p => p.trim());
                        if (photos.length > 0) {
                            photosHtml = `
                                <div class="review-photos-grid" style="display:grid;grid-template-columns:repeat(auto-fill,40px);gap:4px;margin-top:12px;padding-top:10px;border-top:1px dashed #ccc;max-width:200px;">
                                    ${photos.map(photo => `<div class="review-photo-frame" style="width:40px;height:40px;overflow:hidden;border-radius:4px;border:1px solid #999;"><img src="${photo}" style="width:40px;height:40px;object-fit:cover;cursor:pointer;" onclick="document.getElementById('modalImage').src='${photo}'; document.getElementById('photoModal').style.display='flex'"></div>`).join('')}
                                </div>
                            `;
                        }
                    }
                    
                    const managerBadge = r.manager_response ? `<div class="review-manager-response">✓ В отзыве был получен ответ от менеджера. Просмотреть можно в 2ГИС.</div>` : '';
                    
                    return `
                        <div class="review-card">
                            <div class="review-top">
                                <div class="review-author-info">
                                    <div class="review-avatar">${initials}</div>
                                    <div>
                                        <div class="review-name">${r.name}</div>
                                        <div class="review-date">${formatDate(r.review_date || r.created_at)}</div>
                                    </div>
                                </div>
                                <div class="review-rating">${stars}</div>
                            </div>
                            <p class="review-text">${r.text}</p>
                            ${photosHtml}
                            ${managerBadge}
                            <div class="review-footer">
                                <span class="review-source">📍 Источник: 2ГИС</span>
                                ${linkBtn}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Ошибка загрузки отзывов:', error);
                grid.innerHTML = `
                    <div class="reviews-empty">
                        <div class="reviews-empty-icon">⚠️</div>
                        <h3>Ошибка загрузки</h3>
                        <p>Попробуйте обновить страницу</p>
                    </div>
                `;
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const months = ['Января', 'Февраля', 'Марта', 'Апреля', 'Мая', 'Июня', 'Июля', 'Августа', 'Сентября', 'Октября', 'Ноября', 'Декабря'];
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            return `${day} ${month} ${year} года`;
        }
        
        function getReviewsWord(n) {
            if (n === 1) return 'отзыва';
            if (n >= 2 && n <= 4) return 'отзывов';
            return 'отзывов';
        }
        
        function waitForSupabase() {
            if (window.supabaseClient) {
                loadReviews();
            } else {
                setTimeout(waitForSupabase, 100);
            }
        }
        waitForSupabase();
    </script>
    
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <span class="close-btn" id="closeProfileModal">&times;</span>
            <div id="profileContent">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>
</body>
</html>
